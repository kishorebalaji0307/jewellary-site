<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B18"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>

    <!-- Gold Border & Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B2F"/>
      <stop offset="30%" stop-color="#C9A96E"/>
      <stop offset="70%" stop-color="#E8CB88"/>
      <stop offset="100%" stop-color="#FAF0DC"/>
    </linearGradient>

    <!-- Facet Gradients -->
    <!-- Gold Facet Light -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3DFB5"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
    
    <!-- Gold Facet Dark -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#7D6328"/>
    </linearGradient>

    <!-- Silver Facet Light -->
    <linearGradient id="silverLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0DDD8"/>
    </linearGradient>

    <!-- Silver Facet Medium -->
    <linearGradient id="silverMed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0DDD8"/>
      <stop offset="100%" stop-color="#9E9890"/>
    </linearGradient>

    <!-- Silver Facet Dark -->
    <linearGradient id="silverDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4BFB8"/>
      <stop offset="100%" stop-color="#7A746C"/>
    </linearGradient>
  </defs>

  <!-- Outer Circle Background -->
  <circle cx="24" cy="24" r="22" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Inner Diamond Group with subtle scale and shadow -->
  <g transform="translate(0, 0.5)">
    <!-- Facet 1: Left Outer (Silver Medium) -->
    <path d="M 17 13 L 11 21 L 20 21 Z" fill="url(#silverMed)"/>
    
    <!-- Facet 2: Left Inner (Gold Light) -->
    <path d="M 17 13 L 20 21 L 24 13 Z" fill="url(#goldLight)"/>
    
    <!-- Facet 3: Center Upper (Silver Light) -->
    <path d="M 24 13 L 20 21 L 28 21 Z" fill="url(#silverLight)"/>
    
    <!-- Facet 4: Right Inner (Gold Dark) -->
    <path d="M 24 13 L 28 21 L 31 13 Z" fill="url(#goldDark)"/>
    
    <!-- Facet 5: Right Outer (Silver Dark) -->
    <path d="M 31 13 L 37 21 L 28 21 Z" fill="url(#silverDark)"/>
    
    <!-- Facet 6: Left Lower (Silver Med) -->
    <path d="M 11 21 L 20 21 L 24 35 Z" fill="url(#silverMed)"/>
    
    <!-- Facet 7: Center Lower (Gold Light) -->
    <path d="M 20 21 L 28 21 L 24 35 Z" fill="url(#goldLight)"/>
    
    <!-- Facet 8: Right Lower (Silver Dark) -->
    <path d="M 28 21 L 37 21 L 24 35 Z" fill="url(#silverDark)"/>

    <!-- Wireframe Overlay for crisp luxury detail -->
    <path d="M 17 13 L 11 21 L 20 21 L 17 13 M 20 21 L 24 13 L 28 21 L 31 13 L 37 21 L 28 21 M 24 13 L 20 21 M 11 21 L 24 35 L 20 21 M 24 35 L 28 21 M 24 35 L 37 21" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="0.5" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
          
    <!-- Sparkle Highlight -->
    <path d="M 31 15 L 32 13 L 31 11 L 30 13 Z" fill="#FFFFFF" opacity="0.95"/>
    <path d="M 29.5 13 L 32.5 13" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round"/>
    <path d="M 31 11.5 L 31 14.5" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round"/>
  </g>
</svg>